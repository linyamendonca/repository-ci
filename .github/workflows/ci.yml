name: CI/CD Java 21

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build da aplicação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Permissão no Maven Wrapper
        run: chmod +x mvnw

      - name: Build com Maven
        run: ./mvnw clean package -DskipTests

  docker:
    name: Criar imagem Docker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build da imagem Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/meu-projeto:latest .

      - name: Push da imagem Docker
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/meu-projeto:latest

  deploy:
    name: Deploy EC2
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Conectar na EC2 e atualizar container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker stop meu-projeto || true
            docker rm meu-projeto || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/meu-projeto:latest

            docker run -d \
              --name meu-projeto \
              -p 8080:8080 \
              ${{ secrets.DOCKER_USERNAME }}/meu-projeto:latest